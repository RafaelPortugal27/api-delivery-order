version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: snack_api_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-snack_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-snack_pass}
      POSTGRES_DB: ${DB_NAME:-snack_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - snack_network

  redis:
    image: redis:7-alpine
    container_name: snack_api_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - snack_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snack_api_app
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - '3000:3000'
    networks:
      - snack_network

volumes:
  postgres_data:

networks:
  snack_network:
    driver: bridge
